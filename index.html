  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;color:oklch(0.45 0.09 240);width:130px;flex-shrink:0;\">{{ p.race.aLabel }}<\u002Fspan>\n            <div style=\"flex:1;height:10px;background:#f0f0ec;border-radius:5px;overflow:hidden;\"><div style=\"height:100%;background:oklch(0.45 0.09 240);border-radius:5px;animation:fillBar {{ p.race.aDur }} linear forwards;\"><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ p.ba }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:28px;max-width:840px;\">\n          <div style=\"border:1px dashed #c9c9c4;border-radius:10px;background:#f6f6f3;padding:20px 22px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;color:#8a8d92;\">BEFORE<\u002Fdiv>\n            <div style=\"font-family:'Source Serif 4',serif;font-size:18px;font-weight:600;margin-top:10px;color:#45484d;\">{{ p.ba.bTitle }}<\u002Fdiv>\n            <p style=\"font-size:13px;color:#8a8d92;line-height:1.6;margin:8px 0 18px 0;\">{{ p.ba.bDesc }}<\u002Fp>\n            <div style=\"position:relative;height:6px;background:#e6e6e2;border-radius:3px;\">\n              <div style=\"position:absolute;top:-1px;left:0;width:8px;height:8px;border-radius:50%;background:#9a9da3;animation:dotAcross 4.8s linear infinite;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border:1px solid oklch(0.45 0.09 240);border-radius:10px;background:#fff;padding:20px 22px;\">\n            <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.14em;color:oklch(0.45 0.09 240);\">AFTER<\u002Fdiv>\n            <div style=\"font-family:'Source Serif 4',serif;font-size:18px;font-weight:600;margin-top:10px;\">{{ p.ba.aTitle }}<\u002Fdiv>\n            <p style=\"font-size:13px;color:#45484d;line-height:1.6;margin:8px 0 18px 0;\">{{ p.ba.aDesc }}<\u002Fp>\n            <div style=\"position:relative;height:6px;background:#eef1f5;border-radius:3px;\">\n              <div style=\"position:absolute;top:-1px;left:0;width:8px;height:8px;border-radius:50%;background:oklch(0.45 0.09 240);animation:dotAcross 1.2s linear infinite;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Farticle>\n  <\u002Fsc-for>\n\n  <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#8a8d92;text-align:center;padding:56px 0 8px 0;\">KEEP SCROLLING PAST THE END → {{ nextLabel }}<\u002Fdiv>\n<\u002Fmain>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ overlay }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;inset:0;z-index:100;background:rgba(251,251,249,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:30px;animation:fadeIn 0.2s ease;\">\n    <div style=\"position:relative;display:flex;align-items:center;gap:18px;\">\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid #e6e6e2;border-radius:10px;background:#fff;padding:14px 18px 11px 18px;\">\n        <img src=\"54af46a2-a2db-40c7-967a-914988bea0ad\" style=\"width:30px;height:30px;\" alt=\"ADF\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8a8d92;\">ADF<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:52px;border-top:1px dashed #c9c9c4;\"><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid #e6e6e2;border-radius:10px;background:#fff;padding:14px 18px 11px 18px;\">\n        <img src=\"5c7f98fc-38b6-42b2-8d0a-07d6d847d3fb\" style=\"width:30px;height:30px;\" alt=\"Databricks\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8a8d92;\">DATABRICKS<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:52px;border-top:1px dashed #c9c9c4;\"><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;align-items:center;gap:6px;border:1px solid #e6e6e2;border-radius:10px;background:#fff;padding:14px 18px 11px 18px;\">\n        <img src=\"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' sc-camel-view-box='0 0 24 24'%3E%3Cpath d='M12 3 22 21H2Z' fill='%231c1e21'/%3E%3C/svg%3E\" style=\"width:30px;height:30px;\" alt=\"Delta Lake\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:10px;color:#8a8d92;\">DELTA LAKE<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"position:absolute;top:-10px;left:0;width:8px;height:8px;border-radius:50%;background:oklch(0.45 0.09 240);animation:dotAcross 1.1s linear infinite;\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.16em;color:#45484d;\">RUNNING PIPELINE…<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ advance }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"position:fixed;left:0;right:0;bottom:0;z-index:100;height:48px;background:#1c1e21;display:flex;align-items:center;justify-content:center;overflow:hidden;\">\n    <div style=\"position:absolute;left:0;top:0;bottom:0;background:oklch(0.45 0.09 240);opacity:0.45;animation:fillBar 1.4s linear forwards;\"><\u002Fdiv>\n    <span style=\"position:relative;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;color:#fbfbf9;\">ADVANCING TO {{ nextLabel }} — SCROLL UP TO CANCEL<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;enableNavAnimation&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;},&quot;enableScrollAdvance&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Motion&quot;}}\">\nclass Component extends DCLogic {\n  state = { view: 'home', overlay: false, advance: false };\n  next = { home: 'exa', exa: 'azi', azi: 'ps', ps: 'home' };\n  labels = { home: 'HOME', exa: 'EXAQUBE', azi: 'AZIMUTH GRC', ps: 'PLANETSPARK' };\n\n  ic(name, label, sep) {\n    let src = 'https://cdn.simpleicons.org/' + name;\n    if (name === 'azure') src = 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/azure/azure-original.svg';\n    if (name === 'deltalake') src = \"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath d='M12 3 22 21H2Z' fill='%231c1e21'/%3E%3C/svg%3E\";\n    return { src, label, sep: !!sep };\n  }\n\n  companies() {\n    const ic = this.ic.bind(this);\n    return {\n      exa: {\n        company: 'ExaQube', period: '2026 — NOW · DELHI NCR', role: 'Data Engineer — Lakehouse Platform',\n        blurb: 'Building and operating a self-hosted Lakehouse: Spark and Delta Lake on bare-metal Ubuntu, containerized ingestion, and relentless performance work.',\n        projects: [\n          { num: '01', title: 'Self-hosted Lakehouse on Ubuntu',\n            icons: [ic('ubuntu','UBUNTU'), ic('apachespark','SPARK',1), ic('deltalake','DELTA LAKE',1), ic('databricks','DATABRICKS',1)],\n            bullets: [\n              'Provisioned Spark 3.5 + Delta Lake on bare-metal Ubuntu servers, replacing a vendor ETL stack.',\n              'Rewrote the nightly batch as incremental Delta merges — the 6-hour window now finishes in 30 minutes (92% faster).',\n              'Z-ordering and file-compaction jobs keep query latency flat as data volume grows.'\n            ],\n            race: { bLabel: 'BEFORE · 6h 00m', bDur: '9.6s', aLabel: 'AFTER · 30m', aDur: '0.8s' },\n            ba: { bTitle: 'Monolithic nightly batch', bDesc: 'Full table rewrites in one sequential job — any failure meant rerunning all six hours.',\n                  aTitle: 'Incremental medallion flow', aDesc: 'Parallel Delta merges on partitioned data; failures replay only their own slice.' } },\n          { num: '02', title: 'Config-driven ingestion in Docker',\n            icons: [ic('docker','DOCKER'), ic('python','PYTHON',1), ic('deltalake','DELTA LAKE',1)],\n            bullets: [\n              'Dockerized Python connectors defined entirely by YAML config — a new source onboards in under a day.',\n              'Idempotent, checkpointed loads with automatic schema evolution into bronze Delta tables.',\n              'One image, many sources: eight pipelines run from the same container with different configs.'\n            ], race: null, ba: null },\n          { num: '03', title: 'Spark performance clinic',\n            icons: [ic('apachespark','SPARK'), ic('databricks','DATABRICKS',1), ic('deltalake','DELTA LAKE',1)],\n            bullets: [\n              'Tuned shuffle partitions, broadcast joins and adaptive query execution across the heaviest jobs.',\n              'Cut cluster hours 65% on the ten most expensive jobs.',\n              'Wrote the internal tuning playbook now applied to every new job.'\n            ], race: null, ba: null }\n        ]\n      },\n      azi: {\n        company: 'Azimuth GRC', period: '2023 — 2026 · DELHI NCR', role: 'Data Engineer · Azure Databricks Specialist',\n        blurb: 'Modernized the compliance-data platform on Azure: ADF pipelines rebuilt on Databricks Workflows over a medallion Delta Lake architecture.',\n        projects: [\n          { num: '01', title: 'ADF → Databricks ELT modernization',\n            icons: [ic('azure','AZURE ADF'), ic('databricks','DATABRICKS',1), ic('deltalake','DELTA LAKE',1)],\n            bullets: [\n              'Migrated 40+ ADF copy/transform pipelines to Databricks Workflows with Delta Lake targets.',\n              'Flagship pipeline: 1h 50m → 30m by pushing transforms out of ADF data flows into Spark SQL.',\n              'Zero-downtime cutover with parallel-run validation on row counts and checksums.'\n            ],\n            race: { bLabel: 'BEFORE · 1h 50m', bDur: '8.8s', aLabel: 'AFTER · 30m', aDur: '2.4s' }, ba: null },\n          { num: '02', title: 'Medallion architecture on Delta Lake',\n            icons: [ic('databricks','DATABRICKS'), ic('deltalake','DELTA LAKE',1), ic('apachespark','SPARK',1)],\n            bullets: [\n              'Designed bronze/silver/gold layers for GRC compliance data with enforced quality gates.',\n              'Delta constraints and expectations quarantine bad records instead of failing whole pipelines.',\n              'Compute cost down 65% via job clusters, spot instances and right-sized autoscaling.'\n            ], race: null,\n            ba: { bTitle: 'Shared all-purpose cluster', bDesc: 'One always-on cluster ran everything — idle burn, noisy neighbors, brittle handoffs between ADF activities.',\n                  aTitle: 'Job clusters on medallion layers', aDesc: 'Ephemeral right-sized clusters per workflow; quality gates between bronze, silver and gold.' } },\n          { num: '03', title: 'CI/CD & observability for pipelines',\n            icons: [ic('azure','AZURE DEVOPS'), ic('docker','DOCKER',1), ic('python','PYTHON',1)],\n            bullets: [\n              'Azure DevOps CI/CD: notebooks and job definitions deploy from Git — no manual promotion.',\n              'Centralized run telemetry: failures alert in minutes, not the next morning.',\n              'Monthly reliability reviews cut recurring incidents to near zero.'\n            ], race: null, ba: null }\n        ]\n      },\n      ps: {\n        company: 'PlanetSpark', period: '2022 — 2023 · GURUGRAM', role: 'Data Analyst → Data Engineer',\n        blurb: 'First data role: automated the operations reporting stack with Google Sheets, Apps Script and Python — and got promoted into engineering for it.',\n        projects: [\n          { num: '01', title: 'Sheets-native ops automation',\n            icons: [ic('googlesheets','SHEETS'), ic('googleappsscript','APPS SCRIPT',1)],\n            bullets: [\n              'Apps Script automations replaced manual roll-ups across 20+ operations sheets.',\n              'Reporting cycles 25% faster, with zero copy-paste errors after launch.',\n              'Trigger-driven refreshes meant leadership saw same-day numbers instead of week-old ones.'\n            ], race: null, ba: null },\n          { num: '02', title: 'Python reporting pipeline',\n            icons: [ic('python','PYTHON'), ic('googlesheets','SHEETS',1)],\n            bullets: [\n              'Scheduled Python jobs consolidated CRM and ops data into a single reporting layer.',\n              'Standardized metric definitions across sales and delivery teams.'\n            ], race: null, ba: null }\n        ]\n      }\n    };\n  }\n\n  componentDidMount() {\n    this.onWheel = (e) => {\n      if (this.state.overlay) return;\n      if ((this.props.enableScrollAdvance ?? true) === false) return;\n      const doc = document.documentElement;\n      const atBottom = window.innerHeight + window.scrollY >= doc.scrollHeight - 4;\n      if (e.deltaY > 0 && atBottom && !this.state.advance) {\n        this.setState({ advance: true });\n        this.advT = setTimeout(() => {\n          const v = this.next[this.state.view];\n          this.setState({ advance: false, view: v });\n          window.scrollTo(0, 0);\n        }, 1450);\n      } else if (e.deltaY < 0 && this.state.advance) {\n        clearTimeout(this.advT);\n        this.setState({ advance: false });\n      }\n    };\n    window.addEventListener('wheel', this.onWheel, { passive: true });\n  }\n  componentWillUnmount() {\n    window.removeEventListener('wheel', this.onWheel);\n    clearTimeout(this.advT); clearTimeout(this.ovT);\n  }\n\n  go(v) {\n    clearTimeout(this.advT);\n    this.setState({ view: v, advance: false, overlay: false });\n    window.scrollTo(0, 0);\n  }\n  scrollNav(id) {\n    const jump = () => {\n      const el = document.getElementById(id);\n      if (el) window.scrollTo({ top: el.getBoundingClientRect().top + window.scrollY - 76, behavior: 'smooth' });\n    };\n    if ((this.props.enableNavAnimation ?? true) === false) {\n      if (this.state.view !== 'home') { this.setState({ view: 'home' }); setTimeout(jump, 60); }\n      else jump();\n      return;\n    }\n    clearTimeout(this.ovT);\n    this.setState({ overlay: true, view: 'home' });\n    this.ovT = setTimeout(() => { this.setState({ overlay: false }); jump(); }, 1250);\n  }\n\n  renderVals() {\n    const v = this.state.view;\n    const c = v === 'home' ? null : this.companies()[v];\n    return {\n      isHome: v === 'home',\n      isCompany: v !== 'home',\n      overlay: this.state.overlay,\n      advance: this.state.advance,\n      nextLabel: this.labels[this.next[v]],\n      pageCompany: c ? c.company : '', pagePeriod: c ? c.period : '',\n      pageRole: c ? c.role : '', pageBlurb: c ? c.blurb : '',\n      pageProjects: c ? c.projects : [],\n      goHome: () => this.go('home'),\n      goExa: () => this.go('exa'),\n      goAzi: () => this.go('azi'),\n      goPs: () => this.go('ps'),\n      navWork: () => this.scrollNav('work'),\n      navSkills: () => this.scrollNav('skills'),\n      navContact: () => this.scrollNav('contact')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
